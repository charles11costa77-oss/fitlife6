name: Build AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure and Build
        run: |
          # 1. Criar configuração global manualmente (evita o 'init' chato)
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # 2. Criar o manifesto na raiz
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.fitlife6.app",
            "host": "melodious-sopapillas-b5d335.netlify.app",
            "name": "FitLife 6",
            "launcherName": "FitLife 6",
            "display": "standalone",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#ffffff",
            "startUrl": "/",
            "iconUrl": "https://melodious-sopapillas-b5d335.netlify.app/icons/icon-512x512.png",
            "maskableIconUrl": "https://melodious-sopapillas-b5d335.netlify.app/icons/icon-512x512.png",
            "appVersion": "1",
            "appVersionCode": 1,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            },
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://melodious-sopapillas-b5d335.netlify.app/manifest.json",
            "fallbackType": "customtabs",
            "minSdkVersion": 19,
            "orientation": "default",
            "fingerprints": []
          }
          EOF

          # 3. Gerar o projeto Android a partir do manifesto (Sem perguntas)
          bubblewrap build --manifest twa-manifest.json --skipSigning || echo "Tentando build direto..."
          
          # 4. Se o comando acima falhar por falta de init, forçamos o build
          yes | bubblewrap build --skipSigning

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitlife6-aab
          path: ./*.aab
          
