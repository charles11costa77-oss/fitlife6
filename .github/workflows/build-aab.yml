name: Build AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure and Build
        run: |
          # Cria a pasta de configuração para não perguntar nada
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # Inicia o projeto respondendo "Não" para instalar novo JDK (usamos o do GitHub)
          echo "n" | bubblewrap init --manifest="https://melodious-sopapillas-b5d335.netlify.app/manifest.json" --metaData='{"packageId":"com.fitlife6.app"}' --directory="./" --skipCheck
          
          # Gera o build aceitando as licenças automaticamente
          yes | bubblewrap build --skipSigning

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitlife6-aab
          path: ./*.aab
          
