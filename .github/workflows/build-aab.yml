name: Build AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure and Build
        run: |
          # 1. Cria a pasta do projeto
          mkdir -p twa && cd twa
          
          # 2. Cria o arquivo de manifesto
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.fitlife6.app",
            "host": "melodious-sopapillas-b5d335.netlify.app",
            "name": "FitLife 6",
            "launcherName": "FitLife 6",
            "display": "standalone",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#ffffff",
            "startUrl": "/",
            "iconUrl": "https://melodious-sopapillas-b5d335.netlify.app/icons/icon-512x512.png",
            "maskableIconUrl": "https://melodious-sopapillas-b5d335.netlify.app/icons/icon-512x512.png",
            "appVersion": "1",
            "appVersionCode": 1,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            },
            "splashScreenFadeOutDuration": 300,
            "enableNotifications": false,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://melodious-sopapillas-b5d335.netlify.app/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {"enabled": false},
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://melodious-sopapillas-b5d335.netlify.app/",
            "minSdkVersion": 19,
            "orientation": "default",
            "fingerprints": []
          }
          EOF

          # 3. Força o Bubblewrap a aceitar os caminhos do GitHub sem validar o JSON manualmente
          # Usamos o comando 'init' de forma automática para preparar o ambiente
          bubblewrap doctor --skip-update-check
          
          # 4. Build
          yes | bubblewrap build --skipSigning

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitlife6-aab
          path: twa/app/build/outputs/bundle/release/*.aab
          
