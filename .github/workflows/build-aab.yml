name: Build AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure and Build
        run: |
          # 1. Configuração global silenciosa
          mkdir -p ~/.bubblewrap
          yes | bubblewrap init --jdkPath "$JAVA_HOME" --androidSdkPath "$ANDROID_HOME"
          
          # 2. Criar o manifesto na raiz para evitar confusão de pastas
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.fitlife6.app",
            "host": "melodious-sopapillas-b5d335.netlify.app",
            "name": "FitLife 6",
            "launcherName": "FitLife 6",
            "display": "standalone",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#ffffff",
            "startUrl": "/",
            "iconUrl": "https://melodious-sopapillas-b5d335.netlify.app/icons/icon-512x512.png",
            "maskableIconUrl": "https://melodious-sopapillas-b5d335.netlify.app/icons/icon-512x512.png",
            "appVersion": "1",
            "appVersionCode": 1,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            },
            "splashScreenFadeOutDuration": 300,
            "enableNotifications": false,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://melodious-sopapillas-b5d335.netlify.app/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {"enabled": false},
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://melodious-sopapillas-b5d335.netlify.app/",
            "minSdkVersion": 19,
            "orientation": "default",
            "fingerprints": []
          }
          EOF

          # 3. Inicializa o projeto a partir do manifesto
          # Isso cria a estrutura necessária para o build
          bubblewrap init --manifest twa-manifest.json --directory ./
          
          # 4. Build Final
          yes | bubblewrap build --skipSigning

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitlife6-aab
          # O caminho do arquivo gerado agora será relativo à raiz
          path: app-release-bundle.aab
          
          
