name: Build AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64\",\"androidSdkPath\":\"/usr/local/lib/android/sdk\"}" > ~/.bubblewrap/config.json

      - name: Create TWA manifest manually
        run: |
          mkdir -p twa && cd twa
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.fitlife6.app",
            "host": "melodious-sopapillas-b5d335.netlify.app",
            "name": "FitLife 6",
            "launcherName": "FitLife 6",
            "display": "standalone",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#ffffff",
            "startUrl": "/",
            "iconUrl": "https://melodious-sopapillas-b5d335.netlify.app/icons/icon-512x512.png",
            "maskableIconUrl": "https://melodious-sopapillas-b5d335.netlify.app/icons/icon-512x512.png",
            "appVersion": "1",
            "appVersionCode": 1,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            },
            "splashScreenFadeOutDuration": 300,
            "enableNotifications": false,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://melodious-sopapillas-b5d335.netlify.app/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {"enabled": false},
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://melodious-sopapillas-b5d335.netlify.app/",
            "minSdkVersion": 19,
            "orientation": "default",
            "fingerprints": []
          }
          EOF
          bubblewrap build --skipSigning

      - uses: actions/upload-artifact@v4
        with:
          name: fitlife6-aab
          path: twa/app/build/outputs/bundle/release/*.aab
