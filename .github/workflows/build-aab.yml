name: Build AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Accept Android SDK licenses
        run: |
          echo "SDK path: $ANDROID_SDK_ROOT"
          ls /usr/local/lib/android/sdk || echo "não existe"
          ls /usr/local/lib/android/ || echo "pasta vazia"
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" || true
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64\",\"androidSdkPath\":\"/usr/local/lib/android/sdk\"}" > ~/.bubblewrap/config.json

      - name: Build AAB
        run: |
          cd twa
          # Corrigir caminho do SDK no config gerado
          sed -i 's|"androidSdkPath":"[^"]*"|"androidSdkPath":"/usr/local/lib/android/sdk"|g' ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json
          bubblewrap build --skipSigning
      - name: Build AAB
        run: |
          cd twa
          # Corrigir caminho do SDK no config gerado
          sed -i 's|"androidSdkPath":"[^"]*"|"androidSdkPath":"/usr/local/lib/android/sdk"|g' ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json
          bubblewrap build --skipSigning

      - uses: actions/upload-artifact@v4
        with:
          name: fitlife6-aab
          path: twa/app/build/outputs/bundle/release/*.aab
