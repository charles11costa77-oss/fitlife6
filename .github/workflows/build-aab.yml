name: Build AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Accept SDK licenses
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0"

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"/usr/local/lib/android/sdk/cmdline-tools/latest\"}" > ~/.bubblewrap/config.json

      - name: Create project and build
        run: |
          sudo apt-get install -y expect
          mkdir -p twa && cd twa
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.fitlife6.app",
            "host": "melodious-sopapillas-b5d335.netlify.app",
            "name": "FitLife 6",
            "launcherName": "FitLife 6",
            "display": "standalone",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#ffffff",
            "iconUrl": "https://melodious-sopapillas-b5d335.netlify.app/icon-512.png",
            "maskableIconUrl": "https://melodious-sopapillas-b5d335.netlify.app/icon-512.png",
            "appVersion": "1",
            "appVersionCode": 1,
            "signingKey": {"path": "./android.keystore", "alias": "android"},
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://melodious-sopapillas-b5d335.netlify.app/manifest.json",
            "fallbackType": "customtabs",
            "minSdkVersion": 19,
            "orientation": "default",
            "fingerprints": []
          }
          EOF
          expect << 'EOF'
          set timeout 60
          spawn bubblewrap build --skipSigning
          expect {
            "(Y/n)" { send "Y\r" ; exp_continue }
            "(y/N)" { send "y\r" ; exp_continue }
            "Accept?" { send "y\r" ; exp_continue }
            eof
          }
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: fitlife6-aab
          path: twa/app/build/outputs/bundle/release/*.aab
