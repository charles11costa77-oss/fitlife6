name: Build AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Accept Android SDK licenses
        run: |
          echo "SDK path: $ANDROID_SDK_ROOT"
          ls /usr/local/lib/android/sdk || echo "não existe"
          ls /usr/local/lib/android/ || echo "pasta vazia"
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" || true
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64\",\"androidSdkPath\":\"/usr/local/lib/android/sdk\"}" > ~/.bubblewrap/config.json

      - name: Init TWA
        run: |
          mkdir -p twa && cd twa
          sudo apt-get install -y expect
          expect << 'EOF'
          set timeout 300
          spawn bubblewrap init --manifest=https://melodious-sopapillas-b5d335.netlify.app/manifest.json --directory=. --skipPwaValidation
          expect {
            "(Y/n)" { send "N\r" ; exp_continue }
            "(y/N)" { send "y\r" ; exp_continue }
            "Accept?" { send "y\r" ; exp_continue }
            "Domain:" { send "\r" ; exp_continue }
            "URL path:" { send "\r" ; exp_continue }
            "Application name:" { send "\r" ; exp_continue }
            "Short name:" { send "\r" ; exp_continue }
            "Package id:" { send "\r" ; exp_continue }
            "version:" { send "\r" ; exp_continue }
            "color:" { send "\r" ; exp_continue }
            "signing key" { send "\r" ; exp_continue }
            eof
          }
          EOF

      - name: Build AAB
        run: |
          cd twa
          bubblewrap build --skipSigning

      - uses: actions/upload-artifact@v4
        with:
          name: fitlife6-aab
          path: twa/app/build/outputs/bundle/release/*.aab
