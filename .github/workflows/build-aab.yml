name: Build AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap JDK
        run: |
          mkdir -p ~/.bubblewrap
          echo '{"jdkPath":"/usr/lib/jvm/java-17-openjdk-amd64"}' > ~/.bubblewrap/config.json

      - name: Init TWA (non-interactive)
        run: |
          mkdir -p twa && cd twa
          bubblewrap init \
            --manifest=https://melodious-sopapillas-b5d335.netlify.app/manifest.json \
            --directory=. \
            --skipPwaValidation \
            --android-sdk-path=$HOME/android-sdk \
            --jdk-path=/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64 2>&1 | tee init.log
          cat init.log

      - name: Build AAB
        run: |
          cd twa
          bubblewrap build --skipSigning 2>&1 | tee build.log

      - uses: actions/upload-artifact@v4
        with:
          name: fitlife6-aab
          path: twa/app/build/outputs/bundle/release/*.aab

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: twa/*.log
        
