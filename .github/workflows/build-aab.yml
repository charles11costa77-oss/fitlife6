name: Build AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure and Build
        run: |
          # Força a configuração do SDK e JDK
          bubblewrap doctor --skipCheck --jdkPath "${JAVA_HOME}" --androidSdkPath "${ANDROID_HOME}"
          
          # Cria o app do zero para evitar erros de diretório
          bubblewrap init --manifest="https://melodious-sopapillas-b5d335.netlify.app/manifest.json" --metaData='{"packageId":"com.fitlife6.app"}' --directory="./" --skipCheck --confirmResign="no"
          
          # Gera o build final
          yes | bubblewrap build --skipSigning

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitlife6-aab
          path: ./*.aab
          
