name: Build AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build TWA via expect
        run: |
          sudo apt-get install -y expect
          
          # Aceitar licenças do SDK antecipadamente
          mkdir -p $HOME/android-sdk/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $HOME/android-sdk/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> $HOME/android-sdk/licenses/android-sdk-license
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" >> $HOME/android-sdk/licenses/android-sdk-license
          
          mkdir -p twa
          cd twa
          expect << 'EOF'
          set timeout 300
          spawn bubblewrap init --manifest=https://melodious-sopapillas-b5d335.netlify.app/manifest.json --directory=. --skipPwaValidation
          expect {
            "(Y/n)" { send "Y\r" ; exp_continue }
            "(y/N)" { send "y\r" ; exp_continue }
            "Accept?" { send "y\r" ; exp_continue }
            eof
          }
          EOF
          bubblewrap build --skipSigning
      - uses: actions/upload-artifact@v4
        with:
          name: fitlife6-aab
          path: twa/app/build/outputs/bundle/release/*.aab
