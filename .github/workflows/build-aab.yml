name: Build AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo '{"jdkPath":"/usr/lib/jvm/java-17-openjdk-amd64"}' > ~/.bubblewrap/config.json

      - name: Init TWA
        run: |
          mkdir -p twa && cd twa
          bubblewrap init \
            --manifest=https://melodious-sopapillas-b5d335.netlify.app/manifest.json \
            --directory=. \
            --skipPwaValidation

      - name: Build AAB
        run: |
          cd twa
          bubblewrap build --skipSigning

      - uses: actions/upload-artifact@v4
        with:
          name: fitlife6-aab
          path: twa/app/build/outputs/bundle/release/*.aab
